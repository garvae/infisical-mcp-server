name: Deploy MCP Runtime

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to deploy
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: preflight
        shell: bash
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -n "$DEPLOY_SSH_HOST" ] && \
             [ -n "$DEPLOY_SSH_USER" ] && \
             [ -n "$DEPLOY_SSH_KEY" ] && \
             [ -n "$DEPLOY_PATH" ] && \
             [ -n "$GHCR_USERNAME" ] && \
             [ -n "$GHCR_PULL_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "deploy_port=${DEPLOY_SSH_PORT:-22}" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "deploy_port=22" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: image
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload compose definition
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ steps.preflight.outputs.deploy_port }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy compose stack
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ steps.preflight.outputs.deploy_port }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export IMAGE_REGISTRY=ghcr.io
            export IMAGE_REPOSITORY=${{ github.repository_owner }}/infisical-mcp-server
            export IMAGE_TAG=${{ steps.image.outputs.tag }}
            docker compose pull infisical-mcp-http
            docker compose up -d infisical-mcp-http
            curl --fail --silent --show-error http://127.0.0.1:${MCP_HTTP_PORT:-3333}/health

      - name: Skip deploy when secrets are not configured
        if: ${{ steps.preflight.outputs.ready != 'true' }}
        run: echo "Deploy secrets are not configured yet. Skipping server deploy."
