name: Validate Fork Changes

on:
  pull_request:
  push:
    branches:
      - main
      - fork/**
      - upstream/**
  workflow_dispatch:

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm run test:runtime
