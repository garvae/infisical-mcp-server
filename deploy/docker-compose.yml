services:
  infisical-mcp-http:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-garvae/infisical-mcp-server}:${IMAGE_TAG:-main}
    container_name: infisical-mcp-http
    restart: unless-stopped
    env_file:
      - .env.infisical-mcp
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3333}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
      MCP_HTTP_BODY_LIMIT_BYTES: ${MCP_HTTP_BODY_LIMIT_BYTES:-4194304}
      MCP_HTTP_SESSION_TTL_MS: ${MCP_HTTP_SESSION_TTL_MS:-300000}
    expose:
      - "${MCP_HTTP_PORT:-3333}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(`http://127.0.0.1:${process.env.MCP_HTTP_PORT || 3333}/health`).then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mcphub

networks:
  mcphub:
    external: true
